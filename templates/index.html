{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Texify - Text Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
  </head>
  <body>
    <!-- Custom Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">Texify</a>
        <button id="themeToggle" class="btn rounded-circle shadow-sm ms-auto" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--switch-bg); border: 1px solid var(--glass-border); color: var(--text-main);">
          <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-sun-fill" viewBox="0 0 16 16">
            <path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
          </svg>
          <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-moon-fill d-none" viewBox="0 0 16 16">
            <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
          </svg>
        </button>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
          <form action="/removePunc/" method="post">
            {% csrf_token %}
            <div class="glass-card mb-5">
              <h3 class="text-center mb-4 fw-bold" style="color: var(--text-main);">Process Your Text <span style="font-size: 1.2rem;">✨</span></h3>

              <div class="form-group mb-4">
                <textarea name="Info" id="inputInfo" class="form-control form-control-custom rounded-4 p-3 shadow-sm" rows="8" placeholder="Paste your text here..." style="resize: none;" required></textarea>
              </div>

              <div class="row px-3 mt-4">
                <div class="col-md-6 mb-2">
                  <div class="form-check form-switch mb-3">
                    <input class="form-check-input" name="remove" type="checkbox" role="switch" id="switchCheckDefault1" />
                    <label class="form-check-label ms-2" for="switchCheckDefault1">Remove Punctuations</label>
                  </div>
                  <div class="form-check form-switch mb-3">
                    <input class="form-check-input" name="fullCaps" type="checkbox" role="switch" id="switchCheckDefault2" />
                    <label class="form-check-label ms-2" for="switchCheckDefault2">UPPERCASE</label>
                  </div>
                  <div class="form-check form-switch mb-3">
                    <input class="form-check-input" name="lineRemover" type="checkbox" role="switch" id="switchCheckDefault3" />
                    <label class="form-check-label ms-2" for="switchCheckDefault3">Remove Newlines</label>
                  </div>
                </div>
                
                <div class="col-md-6 mb-2">
                  <div class="form-check form-switch mb-3">
                    <input class="form-check-input" name="spaceRemover" type="checkbox" role="switch" id="switchCheckDefault4" />
                    <label class="form-check-label ms-2" for="switchCheckDefault4">Remove Extra Spaces</label>
                  </div>
                  <div class="form-check form-switch mb-4">
                    <input class="form-check-input" name="charCount" type="checkbox" role="switch" id="switchCheckDefault5" />
                    <label class="form-check-label ms-2" for="switchCheckDefault5">Character Counter</label>
                  </div>
                </div>
              </div>

              <button class="btn btn-primary-custom w-100 rounded-3 mt-2 fs-5" type="submit">
                Analyze Magic 🔍
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const themeToggle = document.getElementById('themeToggle');
      const sunIcon = document.getElementById('sunIcon');
      const moonIcon = document.getElementById('moonIcon');

      const storedTheme = localStorage.getItem('theme');
      if (storedTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        sunIcon.classList.add('d-none');
        moonIcon.classList.remove('d-none');
      }

      themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'light') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
          sunIcon.classList.remove('d-none');
          moonIcon.classList.add('d-none');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
          sunIcon.classList.add('d-none');
          moonIcon.classList.remove('d-none');
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
